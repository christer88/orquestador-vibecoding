<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreVCO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css?v=1.1">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar__logo">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="sidebar__logo-box">V</div>
                    <div class="sidebar__logo-text-group">
                        <div class="sidebar__logo-text-top">VibeCoding</div>
                        <div class="sidebar__logo-text-bottom">CoreVCO</div>
                    </div>
                </div>
            </div>
            <nav class="sidebar__nav">
                <a href="#dashboard" class="sidebar__nav-item sidebar__nav-item--active" data-view="dashboard">
                    <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Proyectos
                </a>
                <a href="#wizard" class="sidebar__nav-item" data-view="wizard">
                    <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"></path></svg>
                    Nuevo Proyecto
                </a>
                <a href="#accounts" class="sidebar__nav-item" data-view="accounts">
                    <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Cuentas y Claves
                </a>
                <a href="#templates" class="sidebar__nav-item" data-view="templates">
                    <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Plantillas
                </a>
                <a href="#help" class="sidebar__nav-item" data-view="help">
                    <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" x2="12.01" y1="17" y2="17"></line></svg>
                    Ayuda
                </a>
            </nav>
            <div class="sidebar__footer">
                <div class="sidebar__status">
                    <div>CoreVCO</div>
                    <div style="opacity: 0.5;">v1.1</div>
                </div>
            </div>
        </aside>
        <main class="main-content" id="app-content">
            <!-- Vistas se inyectan aquí -->
        </main>
    </div>
    
    <div id="toast-container"></div>
    <script type="module" src="app.js?v=1.1"></script>
</body>
</html>
